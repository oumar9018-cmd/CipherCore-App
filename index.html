<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cipher Core</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <span class="status-badge">STATUS: AGENT</span>
        <span id="utc-time">00:00:00 UTC</span>
    </div>

    <div class="container">
        <div class="score-area">
            <h1 id="balance">0.00</h1>
            <p class="currency">CPR</p>
        </div>

        <div class="core-ring">
            <div class="cipher-logo" id="mining-btn">C</div>
        </div>

        <p id="status-text" class="blink-text">TAP TO SYNC</p>
    </div>

    <div class="nav-dock">
        <div class="nav-item active">HOME</div>
        <div class="nav-item">ASSETS</div>
        <div class="nav-item">MISSIONS</div>
        <div class="nav-item">WALLET</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
