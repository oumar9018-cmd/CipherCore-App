<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Quantum</title>
    <link rel="stylesheet" href="style.css">
    <!-- Sci-Fi Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- LIVE BACKGROUND (Animated Particles) -->
    <canvas id="neural-canvas"></canvas>

    <!-- INTRO OVERLAY -->
    <div id="intro-layer">
        <div class="intro-content">
            <div class="cipher-glitch" data-text="CIPHER">CIPHER</div>
            <div class="loading-bar"><div class="bar-fill"></div></div>
            <p>INITIALIZING QUANTUM PROTOCOL...</p>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="interface">
        
        <!-- Top Bar -->
        <div class="glass-header">
            <div class="user-badge">
                <i class="fa-solid fa-shield-halved"></i>
                <span>NODE: ACTIVE</span>
            </div>
            <div class="settings-trigger"><i class="fa-solid fa-gear"></i></div>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <span class="label">MINED ASSETS</span>
            <h1 id="balance">0.000</h1>
            <span class="currency">CPR</span>
        </div>

        <!-- THE REACTOR (Centerpiece) -->
        <div class="core-wrapper">
            <div class="reactor-container" id="reactor-btn" onclick="toggleMining()">
                <div class="ring outer-ring"></div>
                <div class="ring middle-ring"></div>
                <div class="ring inner-ring"></div>
                <div class="core-text">C</div>
                <div class="status-glow"></div>
            </div>
        </div>

        <!-- Mining Control -->
        <div class="control-panel">
            <div id="timer-display">SYSTEM STANDBY</div>
            <div class="status-line">TAP CORE TO SYNC</div>
        </div>

        <!-- Features Menu (Sliding Glass) -->
        <div class="glass-dock">
            <div class="dock-item" onclick="openPanel('roadmap')">
                <i class="fa-solid fa-route"></i>
                <span>Map</span>
            </div>
            <div class="dock-item" onclick="openPanel('whitepaper')">
                <i class="fa-solid fa-file-contract"></i>
                <span>Paper</span>
            </div>
            <div class="dock-item">
                <i class="fa-brands fa-twitter"></i>
                <span>Comm</span>
            </div>
        </div>

    </div>

    <!-- POPUP PANELS -->
    <div id="roadmap" class="slide-panel">
        <h2>PROJECT ROADMAP</h2>
        <div class="panel-content">
            <div class="milestone done">
                <div class="m-dot"></div>
                <h4>Phase 1: Genesis</h4>
                <p>Protocol initialization & core mining.</p>
            </div>
            <div class="milestone">
                <div class="m-dot"></div>
                <h4>Phase 2: The Network</h4>
                <p>Node expansion & validator rewards.</p>
            </div>
        </div>
        <button class="close-panel" onclick="closePanel('roadmap')">CLOSE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
