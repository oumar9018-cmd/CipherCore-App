<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cipher Core</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- INTRO LOADING (Fix: Will vanish completely) -->
    <div id="intro-layer">
        <div class="loader-circle"></div>
        <div class="loader-text">ESTABLISHING SECURE CONNECTION...</div>
    </div>

    <!-- APP HEADER -->
    <div class="top-bar">
        <div class="menu-icon" onclick="openMenu()">☰</div>
        <div class="rank-display">RANK: <span style="color:#d4af37">INITIATE</span></div>
        <div class="wallet-icon">WALLET</div>
    </div>

    <!-- SIDE MENU (Hidden by default) -->
    <div id="side-drawer" class="sidebar">
        <div class="sidebar-header">
            <h3>SYSTEM MENU</h3>
            <div class="close-icon" onclick="closeMenu()">✕</div>
        </div>
        <a href="#">Whitepaper (Locked)</a>
        <a href="#">Roadmap</a>
        <a href="#">Team</a>
        <a href="#">Settings</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-container">
        
        <!-- BALANCE -->
        <div class="balance-box">
            <p>TOTAL ASSETS</p>
            <h1 id="balance-display">0.00 <span class="unit">CPR</span></h1>
        </div>

        <!-- THE BLACK CARD (Centerpiece) -->
        <div class="black-card">
            <div class="card-top">
                <span>CIPHER ELITE</span>
                <span>(((•)))</span>
            </div>
            
            <!-- THE LOGO (CSS Generated - No Broken Images) -->
            <div class="card-center">
                <div class="logo-coin">
                    <span class="c-mark">C</span>
                </div>
            </div>

            <div class="card-bottom">
                <span>ID: 8821-4920</span>
                <span>VALID THRU 12/99</span>
            </div>
        </div>

        <!-- MINING BUTTON area -->
        <div class="action-area">
            <div id="timer-text" class="status-txt">READY TO SYNC</div>
            <button id="mine-btn" class="glow-button" onclick="startMining()">
                ACTIVATE PROTOCOL
            </button>
        </div>

    </div>

    <!-- BOTTOM DOCK -->
    <div class="dock">
        <div class="dock-item active">HOME</div>
        <div class="dock-item">CARDS</div>
        <div class="dock-item">TASKS</div>
        <div class="dock-item">FRIENDS</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
