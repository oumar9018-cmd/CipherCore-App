<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cipher Core</title>
    <link rel="stylesheet" href="style.css">
    <!-- Premium Font (Inter) - No more Hacker style -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- INTRO ANIMATION (Loading Screen) -->
    <div id="intro-screen">
        <div class="intro-logo">
            <img src="https://pbs.twimg.com/profile_images/1766696986422239232/W-d3lYwI_400x400.jpg" alt="Logo" class="pulse-logo">
        </div>
        <div class="loading-bar">
            <div class="progress"></div>
        </div>
        <p>INITIALIZING PROTOCOL...</p>
    </div>

    <!-- MAIN APP -->
    <div id="app-content">
        
        <!-- Header with Menu -->
        <div class="header">
            <div class="menu-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="user-rank">RANK: <span class="gold-text">INITIATE</span></div>
            <div class="settings-btn"><i class="fas fa-wallet"></i></div>
        </div>

        <!-- Sidebar Menu (Hidden) -->
        <div id="side-menu" class="side-menu">
            <div class="menu-header">
                <h2>CIPHER OS</h2>
                <i class="fas fa-times close-btn" onclick="toggleMenu()"></i>
            </div>
            <ul class="menu-list">
                <li><i class="fas fa-file-alt"></i> Whitepaper</li>
                <li><i class="fas fa-road"></i> Roadmap</li>
                <li><i class="fas fa-users"></i> Team</li>
                <li><i class="fas fa-cog"></i> Settings</li>
            </ul>
        </div>

        <!-- Balance Section -->
        <div class="balance-container">
            <p class="balance-label">TOTAL ASSETS</p>
            <h1 id="balance">0.00 <span class="currency">CPR</span></h1>
        </div>

        <!-- Main Card Area -->
        <div class="card-area">
            <div class="glass-card">
                <div class="card-header">
                    <span>CIPHER IDENTITY</span>
                    <i class="fas fa-wifi"></i>
                </div>
                <!-- LOGO IMAGE HERE -->
                <div class="card-logo-center">
                    <img src="https://pbs.twimg.com/profile_images/1766696986422239232/W-d3lYwI_400x400.jpg" alt="Core">
                </div>
                <div class="card-footer">
                    <span>ID: 8821-4920</span>
                    <span>VALID</span>
                </div>
            </div>
        </div>

        <!-- Mining Button (12 Hours) -->
        <div class="mining-section">
            <div class="mining-timer" id="timer">SESSION EXPIRED</div>
            <button id="mining-btn" class="start-btn">
                ACTIVATE PROTOCOL
            </button>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item"><i class="fas fa-layer-group"></i><span>Cards</span></div>
            <div class="nav-item"><i class="fas fa-tasks"></i><span>Missions</span></div>
            <div class="nav-item"><i class="fas fa-user-friends"></i><span>Invite</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
